<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Restore paths forwarded by public/404.html before BrowserRouter starts.
      (function (location) {
        if (!location.search.startsWith('?/')) return;
        var decoded = location.search
          .slice(2)
          .split('&')
          .map(function (part) { return part.replace(/~and~/g, '&'); });
        window.history.replaceState(
          null,
          '',
          '/' + decoded.shift() + (decoded.length ? '?' + decoded.join('&') : '') + location.hash
        );
      })(window.location);
    </script>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StarQ Soft</title>
  </head>
